name: GitHub Clone Count Update (Mon & Thu)

on:
  schedule:
    - cron: "0 0 * * 1,4"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TARGET_OWNER: navaranjithsai
  TARGET_REPO: MailVoyage
  GIST_FILENAME: clone.json
  GIST_DESCRIPTION: MailVoyage clone statistics

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xyz repo
        uses: actions/checkout@v4

      - name: Validate PAT and repo access
        id: auth
        env:
          GH_PAT: ${{ secrets.ABC_PAT }}
        run: |
          set -euo pipefail

          USER_CODE=$(curl -sS -o user.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)

          if [ "$USER_CODE" != "200" ]; then
            echo "PAT validation failed. HTTP $USER_CODE"
            cat user.json
            exit 1
          fi

          LOGIN=$(jq -r '.login' user.json)
          echo "PAT owner: $LOGIN"
          echo "login=$LOGIN" >> "$GITHUB_OUTPUT"

          REPO_CODE=$(curl -sS -o repo.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}")

          if [ "$REPO_CODE" != "200" ]; then
            echo "Cannot access ${TARGET_OWNER}/${TARGET_REPO}. HTTP $REPO_CODE"
            cat repo.json
            exit 1
          fi

      - name: Fetch latest clone traffic from target repo
        env:
          GH_PAT: ${{ secrets.ABC_PAT }}
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/traffic/clones"

          HTTP_CODE=$(curl -sS -o clone.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch clone traffic. HTTP $HTTP_CODE"
            cat clone.json
            exit 1
          fi

          echo "Current clone traffic:"
          jq . clone.json

      - name: Find or create gist under navaranjithsai
        id: gist
        env:
          GH_PAT: ${{ secrets.ABC_PAT }}
        run: |
          set -euo pipefail

          LOGIN="${{ steps.auth.outputs.login }}"

          LIST_CODE=$(curl -sS -o gists.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/gists?per_page=100")

          if [ "$LIST_CODE" != "200" ]; then
            echo "Failed to list gists. HTTP $LIST_CODE"
            cat gists.json
            exit 1
          fi

          GIST_ID=$(jq -r \
            --arg desc "$GIST_DESCRIPTION" \
            --arg file "$GIST_FILENAME" \
            'map(select(.description == $desc and (.files[$file] != null))) | first | .id // empty' \
            gists.json)

          if [ -z "$GIST_ID" ]; then
            echo "No existing gist found. Creating one..."

            jq -n \
              --arg desc "$GIST_DESCRIPTION" \
              --arg file "$GIST_FILENAME" \
              --rawfile content clone.json \
              '{
                description: $desc,
                public: false,
                files: {
                  ($file): {
                    content: $content
                  }
                }
              }' > create_gist.json

            CREATE_CODE=$(curl -sS -o gist_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d @create_gist.json \
              "https://api.github.com/gists")

            if [ "$CREATE_CODE" != "201" ]; then
              echo "Failed to create gist. HTTP $CREATE_CODE"
              cat gist_response.json
              exit 1
            fi

            GIST_ID=$(jq -r '.id' gist_response.json)
            cp clone.json clone_before.json
          else
            echo "Found existing gist: $GIST_ID"

            RAW_URL="https://gist.githubusercontent.com/${LOGIN}/${GIST_ID}/raw/${GIST_FILENAME}"

            if curl -fsSL "$RAW_URL" -o clone_before.json; then
              echo "Downloaded previous clone data"
            else
              echo "Could not download previous clone data, using current data as baseline"
              cp clone.json clone_before.json
            fi
          fi

          echo "id=$GIST_ID" >> "$GITHUB_OUTPUT"
          echo "owner=$LOGIN" >> "$GITHUB_OUTPUT"

      - name: Merge previous clone data with current API data
        run: |
          python3 - <<'PY'
          import json

          def load(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f)
              except Exception:
                  return {}

          previous = load("clone_before.json")
          current = load("clone.json")

          merged = {}

          for source in (previous.get("clones", []), current.get("clones", [])):
              for item in source:
                  ts = item.get("timestamp")
                  if not ts:
                      continue
                  merged[ts] = {
                      "timestamp": ts,
                      "count": int(item.get("count", 0)),
                      "uniques": int(item.get("uniques", 0))
                  }

          clones = [merged[k] for k in sorted(merged.keys())]

          result = {
              "count": sum(x["count"] for x in clones),
              "uniques": sum(x["uniques"] for x in clones),
              "clones": clones
          }

          with open("clone.json", "w", encoding="utf-8") as f:
              json.dump(result, f, indent=2)
          PY

          echo "Merged clone.json:"
          cat clone.json

      - name: Update gist
        env:
          GH_PAT: ${{ secrets.ABC_PAT }}
        run: |
          set -euo pipefail

          jq -n \
            --arg desc "$GIST_DESCRIPTION" \
            --arg file "$GIST_FILENAME" \
            --rawfile content clone.json \
            '{
              description: $desc,
              files: {
                ($file): {
                  content: $content
                }
              }
            }' > update_gist.json

          UPDATE_CODE=$(curl -sS -o update_response.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d @update_gist.json \
            "https://api.github.com/gists/${{ steps.gist.outputs.id }}")

          if [ "$UPDATE_CODE" != "200" ]; then
            echo "Failed to update gist. HTTP $UPDATE_CODE"
            cat update_response.json
            exit 1
          fi

      - name: Create or update CLONE.md
        run: |
          set -euo pipefail

          RAW_URL="https://gist.githubusercontent.com/${{ steps.gist.outputs.owner }}/${{ steps.gist.outputs.id }}/raw/${GIST_FILENAME}"
          ENCODED_RAW_URL=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["RAW_URL"], safe=""))')
          BADGE_URL="https://img.shields.io/badge/dynamic/json?color=success&label=Clones&query=count&url=${ENCODED_RAW_URL}"
          REPO_URL="https://github.com/${TARGET_OWNER}/${TARGET_REPO}"

          cat > CLONE.md <<EOF
          **Markdown**

          \`\`\`markdown
          [![GitHub Clones](${BADGE_URL}&logo=github)](${REPO_URL})
          \`\`\`

          **HTML**

          \`\`\`html
          <a href="${REPO_URL}"><img alt="GitHub Clones" src="${BADGE_URL}&logo=github"></a>
          \`\`\`
          EOF

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add CLONE.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update clone badge"
            git push
          fi
